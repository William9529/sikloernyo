<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siklóernyő Vizsga Felkészítő</title>
    <!-- Modern iOS-szerű betűtípus -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/app_icon.png">
    <meta name="theme-color" content="#F2F2F7">
    <script>
      window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Siklóernyős vizsga</h1>
            <p>Keress rá bármire a vizsgákkal kapcsolatban</p>
        </header>

        <main id="home-view" class="view active">
            <div class="search-box">
                <div class="search-input-wrapper">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8E8E93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-input" onkeyup="handleSearchKeyPress(event)" placeholder="Keresés (pl. meteorológia)...">
                </div>
                <button class="search-btn" onclick="performSearch()">Keresés</button>
            </div>
            
            <div id="search-results-container"></div>

            <div class="button-group">
                <button class="exam-btn primary" onclick="loadExam('A')">"A" vizsga kérdések</button>
                <button class="exam-btn secondary" onclick="loadExam('B')">"B" vizsga kérdések</button>
            </div>
        </main>

        <main id="exam-view" class="view">
            <button class="back-btn" onclick="goHome()">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                Vissza a főoldalra
            </button>
            <h2 id="exam-title"></h2>
            <div id="topics-container"></div>
        </main>
    </div>

    <div id="image-modal" class="modal" onclick="closeModal(event)">
        <span class="close-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </span>
        <img class="modal-content" id="expanded-img" alt="Nagyított kép">
    </div>

    <div id="version-display">v5.1</div>

    <script src="data_a.js"></script>
    <script src="data_b.js"></script>
    <script src="script.js"></script>
</body>
</html>
