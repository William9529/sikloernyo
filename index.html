<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siklóernyő Vizsga Felkészítő</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/app_icon.png">
    <meta name="theme-color" content="#2563eb">
    <script>
      window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Siklóernyős vizsga</h1>
            <p id="subtitle">Keresés vagy témakör választás</p>
        </header>

        <main id="home-view" class="view active">
            <div class="search-box">
                <input type="text" id="search-input" onkeyup="handleSearchKeyPress(event)" placeholder="Kulcsszó (pl. meteorológia)...">
                <button class="search-btn" onclick="performSearch()">OK</button>
            </div>
            
            <div id="search-results-container"></div>

            <div class="button-group">
                <button class="exam-btn primary" onclick="loadExam('A')">"A" vizsga</button>
                <button class="exam-btn secondary" onclick="loadExam('B')">"B" vizsga</button>
            </div>
        </main>

        <main id="exam-view" class="view">
            <button class="back-btn" onclick="goHome()">← Vissza</button>
            <h2 id="exam-title"></h2>
            <div id="topics-container"></div>
        </main>
    </div>

    <div id="image-modal" class="modal" onclick="closeModal(event)">
        <span class="close-btn">&times;</span>
        <img class="modal-content" id="expanded-img" onclick="toggleZoom(event)">
    </div>

    <div id="version-tag">v4.0</div>

    <script src="data_a.js"></script>
    <script src="data_b.js"></script>
    <script src="script.js"></script>
</body>
</html>
