<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siklóernyő Vizsga Felkészítő</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Cache busting minden fontos fájlra -->
    <link rel="stylesheet" href="style.css?v=7.1">
    <link rel="manifest" href="manifest.json?v=7.1">
    <link rel="apple-touch-icon" href="assets/app_icon.png">
    <meta name="theme-color" content="#4A5059">
    <script>
      window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>
    <!-- ... (a tartalom marad) ... -->
    <div id="version-display">v7.1</div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    // Ha frissítés érkezik a háttérben
                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed') {
                                if (navigator.serviceWorker.controller) {
                                    // Van új verzió! Automatikus frissítés.
                                    console.log('Új verzió letöltve, frissítés...');
                                    window.location.reload();
                                }
                            }
                        };
                    };
                });
            });

            // Biztonsági öv: ha a Service Worker átveszi az irányítást, frissítsen egyszer
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    window.location.reload();
                    refreshing = true;
                }
            });
        }
    </script>
    <script src="data_a.js?v=7.1"></script>
    <script src="data_b.js?v=7.1"></script>
    <script src="script.js?v=7.1"></script>
</body>
</html>
